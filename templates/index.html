<!DOCTYPE html>
<html>
<head>
    <title>AttackShield</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        input, textarea {
            width: 300px;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 85%;
            margin-top: 20px;
        }

        td, th {
            border: 1px solid white;
            padding: 10px;
        }

        .attack {
            color: red;
            font-weight: bold;
        }

        a {
            color: cyan;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>🔥 AttackShield - Threat Detection System</h1>

    <form method="POST">

        <!-- Username input -->
        <input 
            type="text" 
            name="username" 
            placeholder="Enter Username"
            required
        >
        <br>

        <!-- Manual IP input -->
        <input 
            type="text" 
            name="ip_address" 
            placeholder="Enter IP Address"
            required
        >
        <br>

        <!-- Payload input -->
        <textarea 
            name="payload" 
            placeholder="Enter attack payload"
            required
        ></textarea>
        <br>

        <button type="submit">Send Request</button>
    </form>

    <p>{{ message }}</p>

    <br>

    <a href="/dashboard">
        <button>View Dashboard</button>
    </a>

    <a href="/block_ip">
        <button>Block Attackers</button>
    </a>

    <h2>Attack Logs</h2>

    <table>
        <tr>
            <th>Log ID</th>
            <th>IP Address</th>
            <th>Payload</th>
            <th>Attack Status</th>
        </tr>

        {% for log in logs %}
        <tr>
            <td>{{ log[0] }}</td>
            <td>{{ log[1] }}</td>
            <td>{{ log[2] }}</td>
            <td class="{{ 'attack' if log[3] else '' }}">
                {{ 'YES' if log[3] else 'NO' }}
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>

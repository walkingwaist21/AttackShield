<!DOCTYPE html>
<html>
<head>
    <title>AttackShield XDR Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        h1{
            margin-top:20px;
        }

        .container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
        }

        .card{
            width:250px;
            background:#1e293b;
            margin:20px;
            padding:20px;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(255,0,0,0.3);
        }

        canvas{
            width:600px !important;
            height:300px !important;
            margin:auto;
        }

        table{
            margin:auto;
            width:80%;
            border-collapse:collapse;
            margin-top:30px;
        }

        td,th{
            border:1px solid white;
            padding:10px;
        }

        .danger{
            color:red;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h1>🚨 AttackShield XDR Dashboard</h1>

<div class="container">
    <div class="card">
        <h2>Total Requests</h2>
        <h1>{{ total_requests }}</h1>
    </div>

    <div class="card">
        <h2>Total Attacks</h2>
        <h1>{{ total_attacks }}</h1>
    </div>

    <div class="card">
        <h2>Blocked IPs</h2>
        <h1>{{ blocked_ips }}</h1>
    </div>

    <div class="card">
        <h2>Top Payload</h2>
        <h3>{{ top_attack[0] if top_attack else "None" }}</h3>
    </div>
</div>

<h2>Attack Distribution</h2>
<canvas id="attackChart"></canvas>

<script>
const ctx = document.getElementById('attackChart');

new Chart(ctx,{
    type:'pie',
    data:{
        labels:['Normal Requests','Attacks'],
        datasets:[{
            data:[{{ total_requests-total_attacks }},{{ total_attacks }}]
        }]
    }
});
</script>

</body>
</html>
